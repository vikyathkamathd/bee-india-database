<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>BEE India Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .modal-open { overflow: hidden; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 antialiased">
    <div x-data="applianceApp()" x-init="initApp()" x-cloak>
        
        <!-- Navbar -->
        <nav class="bg-[#2874f0] sticky top-0 z-40 shadow-md">
            <div class="max-w-7xl mx-auto px-4 py-3 flex items-center gap-4">
                <h1 class="text-white font-extrabold text-xl italic tracking-tighter">BEE</h1>
                <div class="relative flex-1">
                    <input type="text" x-model.debounce.300ms="searchQuery" placeholder="Search models or brands..." 
                           class="w-full bg-white rounded-md py-2 pl-10 pr-4 text-sm outline-none focus:ring-2 focus:ring-blue-300 shadow-inner">
                    <span class="absolute left-3 top-2.5 text-gray-400 text-xs">🔍</span>
                </div>
            </div>
        </nav>

        <!-- Category Section -->
        <div class="bg-white border-b shadow-sm sticky top-[60px] z-30">
            <div class="max-w-7xl mx-auto px-4 py-3 flex flex-col gap-3">
                <div class="flex items-center justify-between">
                    <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest" x-text="'Last Updated: ' + lastUpdated"></span>
                    <button @click="isCatSearchOpen = true" class="text-[#2874f0] text-xs font-bold flex items-center gap-1">
                        <span>CHANGE CATEGORY</span> 📂
                    </button>
                </div>
                <div class="flex overflow-x-auto no-scrollbar gap-2 items-center pb-1">
                     <template x-for="cat in categories.slice(0, 8)" :key="cat.file">
                         <button @click="selectedCategory = cat.file; fetchData()"
                                 :class="selectedCategory === cat.file ? 'bg-[#2874f0] text-white border-[#2874f0]' : 'bg-white text-gray-600 border-gray-200 hover:bg-gray-50'"
                                 class="px-4 py-1.5 rounded-full border text-[11px] font-bold whitespace-nowrap transition-all shadow-sm"
                                 x-text="cat.name">
                         </button>
                     </template>
                     <button @click="isCatSearchOpen = true" class="px-4 py-1.5 rounded-full border border-dashed border-gray-300 text-gray-400 text-[11px] font-bold whitespace-nowrap">
                         VIEW ALL...
                     </button>
                </div>
            </div>
        </div>

        <main class="max-w-7xl mx-auto mb-20 p-4">
            <div class="flex justify-between items-center mb-4 text-[10px] font-black text-gray-500 uppercase tracking-tighter">
                <span x-text="products.length > 0 ? `${filteredProducts.length} items in ${currentCategoryName}` : 'Syncing Data...'"></span>
            </div>

            <!-- Product Grid -->
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                <template x-for="p in filteredProducts.slice(0, displayLimit)" :key="p.Model + Math.random()">
                    <div class="bg-white rounded-xl border border-gray-200 shadow-sm flex flex-col justify-between overflow-hidden hover:shadow-md transition-shadow">
                        <div class="p-4 flex-1">
                            <div class="flex justify-between items-start mb-3">
                                <span class="text-[9px] font-black text-blue-600 tracking-wider uppercase bg-blue-50 px-2 py-1 rounded border border-blue-100" x-text="p.Brand"></span>
                                <div x-show="p['Star Rating'] && p['Star Rating'] != '0'" class="flex items-center gap-1 bg-green-600 text-white px-2 py-0.5 rounded text-[10px] font-bold">
                                    <span x-text="p['Star Rating']"></span> <span>★</span>
                                </div>
                            </div>
                            <h3 class="font-bold text-gray-900 text-sm leading-tight mb-4 line-clamp-2" x-text="p.Model"></h3>
                            <div class="space-y-0 text-[11px]">
                                <template x-for="[key, val] in Object.entries(p).filter(([k, v]) => !['Brand', 'Model', 'Category', 'Star Rating'].includes(k) && v).slice(0, 4)">
                                    <div class="flex justify-between items-center py-1.5 border-b border-gray-50 last:border-0">
                                        <span class="text-gray-400 truncate pr-2 w-1/2" x-text="key"></span>
                                        <span class="font-bold text-gray-700 text-right truncate w-1/2" x-text="val"></span>
                                    </div>
                                </template>
                            </div>
                        </div>
                        <button @click="viewSpecs(p)" class="w-full bg-gray-50 hover:bg-gray-100 text-gray-500 font-bold text-[10px] py-3 border-t border-gray-100 transition-colors tracking-widest">
                            SPECIFICATIONS
                        </button>
                    </div>
                </template>
            </div>

            <!-- Empty State -->
            <div x-show="!isLoading && products.length === 0" class="flex flex-col items-center justify-center py-20 text-center bg-white rounded-xl border border-gray-200 mt-4">
                <span class="text-4xl mb-2">📭</span>
                <h3 class="font-bold text-gray-700">No data found</h3>
                <p class="text-gray-400 text-xs mt-1">Try a different search or category.</p>
            </div>

            <div id="load-more-trigger" class="p-8 flex justify-center">
                <template x-if="isLoading">
                    <div class="w-6 h-6 border-2 border-[#2874f0] border-t-transparent rounded-full animate-spin"></div>
                </template>
            </div>
        </main>

        <!-- Bottom Actions -->
        <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex h-14 shadow-lg z-40">
            <button @click="isSortOpen = true" class="flex-1 font-bold text-[10px] text-gray-600 border-r border-gray-100 flex items-center justify-center gap-2 hover:bg-gray-50">
                ⇅ SORT
            </button>
            <button @click="openFilter()" class="flex-1 font-bold text-[10px] text-gray-600 flex items-center justify-center gap-2 hover:bg-gray-50">
                ⚙️ FILTER
            </button>
        </div>

        <!-- Category Search Modal -->
        <div x-show="isCatSearchOpen" class="fixed inset-0 z-[100] flex flex-col bg-white" x-cloak>
            <div class="p-4 border-b flex items-center gap-4 bg-gray-50">
                <button @click="isCatSearchOpen = false" class="text-gray-400 text-xl">←</button>
                <input type="text" x-model="catSearchQuery" placeholder="Search categories..." 
                       class="flex-1 bg-white border rounded-lg py-2 px-4 text-sm outline-none focus:ring-2 focus:ring-blue-300">
            </div>
            <div class="flex-1 overflow-y-auto p-2">
                <div class="grid grid-cols-1 gap-1">
                    <template x-for="cat in filteredCategories" :key="cat.file">
                        <button @click="selectedCategory = cat.file; fetchData(); isCatSearchOpen = false" 
                                :class="selectedCategory === cat.file ? 'bg-blue-50 border-blue-200 text-blue-700' : 'text-gray-600 border-transparent'"
                                class="w-full text-left px-4 py-3 rounded-lg border text-sm font-medium flex justify-between items-center">
                            <span x-text="cat.name"></span>
                            <span x-show="selectedCategory === cat.file">✓</span>
                        </button>
                    </template>
                </div>
            </div>
        </div>

        <!-- Details Modal -->
        <div x-show="isSpecsOpen" class="fixed inset-0 z-[70] flex flex-col justify-end sm:justify-center items-center p-0 sm:p-4" x-cloak>
            <div @click="closeSpecs()" class="absolute inset-0 bg-black/60 transition-opacity"></div>
            <div class="relative bg-white w-full sm:max-w-md h-[80vh] sm:h-auto sm:max-h-[85vh] rounded-t-3xl sm:rounded-2xl flex flex-col shadow-2xl overflow-hidden">
                <div class="flex justify-between items-center p-5 border-b shadow-sm">
                    <div class="overflow-hidden">
                        <span class="text-[9px] font-black text-blue-600 uppercase" x-text="selectedProduct?.Brand"></span>
                        <h2 class="font-bold text-gray-900 text-lg truncate leading-tight mt-0.5" x-text="selectedProduct?.Model"></h2>
                    </div>
                    <button @click="closeSpecs()" class="w-8 h-8 rounded-full bg-gray-100 text-gray-500 font-bold">&times;</button>
                </div>
                <div class="flex-1 overflow-y-auto p-4 bg-gray-50">
                    <div class="bg-white border rounded-xl overflow-hidden shadow-sm">
                         <template x-for="(val, key) in selectedProduct">
                            <template x-if="val && !['Category'].includes(key)">
                                <div class="flex flex-col sm:flex-row p-3.5 border-b border-gray-50 last:border-0">
                                    <span class="text-[10px] text-gray-400 uppercase font-black mb-1 sm:mb-0 sm:w-1/2" x-text="key"></span>
                                    <span class="text-sm font-bold text-gray-800 sm:w-1/2 sm:text-right" x-text="val"></span>
                                </div>
                            </template>
                         </template>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filter/Sort Modals (Simplified for brevity) -->
        <div x-show="isFilterOpen" class="fixed inset-0 z-[60] bg-white flex flex-col" x-cloak>
            <div class="p-4 border-b flex justify-between items-center bg-gray-50">
                <h2 class="font-bold">Filters</h2>
                <button @click="closeFilter()" class="text-2xl text-gray-300">&times;</button>
            </div>
            <div class="flex flex-1 overflow-hidden">
                <div class="w-1/3 bg-gray-50 overflow-y-auto border-r">
                    <button @click="activeTab = 'brand'" :class="activeTab === 'brand' ? 'bg-white border-l-4 border-blue-500 text-blue-600' : 'text-gray-400'" class="w-full text-left p-4 text-[10px] font-black uppercase">Brand</button>
                    <template x-for="(options, spec) in dynamicFilters">
                        <button @click="activeTab = spec" :class="activeTab === spec ? 'bg-white border-l-4 border-blue-500 text-blue-600' : 'text-gray-400'" class="w-full text-left p-4 text-[10px] font-black uppercase truncate" x-text="spec"></button>
                    </template>
                </div>
                <div class="flex-1 overflow-y-auto p-4 bg-white">
                    <div x-show="activeTab === 'brand'">
                        <template x-for="b in allBrands">
                            <label class="flex items-center gap-3 p-3 border-b border-gray-50">
                                <input type="checkbox" :value="b" x-model="brandFilters" class="w-4 h-4 accent-blue-600">
                                <span class="text-sm text-gray-600" x-text="b"></span>
                            </label>
                        </template>
                    </div>
                    <template x-for="(options, spec) in dynamicFilters">
                        <div x-show="activeTab === spec">
                            <template x-for="opt in options">
                                <label class="flex items-center gap-3 p-3 border-b border-gray-50">
                                    <input type="checkbox" :value="opt" x-model="activeFilters[spec]" class="w-4 h-4 accent-blue-600">
                                    <span class="text-sm text-gray-600" x-text="opt"></span>
                                </label>
                            </template>
                        </div>
                    </template>
                </div>
            </div>
            <div class="p-4 border-t flex gap-4 bg-gray-50">
                <button @click="resetFilters()" class="flex-1 py-3 text-xs font-bold border rounded-lg bg-white">CLEAR</button>
                <button @click="closeFilter()" class="flex-1 py-3 text-xs font-bold bg-[#fb641b] text-white rounded-lg">APPLY</button>
            </div>
        </div>

    </div>

    <script>
        function applianceApp() {
            return {
                selectedCategory: '', categories: [], products: [], searchQuery: '', catSearchQuery: '',
                displayLimit: 24, isLoading: false, isFilterOpen: false, isSortOpen: false, isCatSearchOpen: false,
                activeTab: 'brand', sortBy: 'relevance', brandFilters: [], allBrands: [], 
                activeFilters: {}, dynamicFilters: {}, selectedProduct: null, isSpecsOpen: false, lastUpdated: '',

                async initApp() { await this.scanFiles(); this.initInfiniteScroll(); },
                
                async scanFiles() {
                    try {
                        const res = await fetch('data/manifest.json');
                        const data = await res.json();
                        this.lastUpdated = data.last_updated;
                        this.categories = data.files.map(f => ({ file: 'data/' + f, name: f.replace('.json', '').replace(/_/g, ' ') }));
                        if (this.categories.length > 0) {
                            this.selectedCategory = this.categories[0].file;
                            this.fetchData();
                        }
                    } catch (e) {}
                },
                
                async fetchData() {
                    if (!this.selectedCategory) return;
                    this.isLoading = true;
                    try {
                        const res = await fetch(this.selectedCategory);
                        this.products = await res.json();
                        this.generateFilters(); this.displayLimit = 24;
                    } catch (e) { this.products = []; }
                    this.isLoading = false;
                },
                
                generateFilters() {
                    this.dynamicFilters = {}; this.activeFilters = {};
                    this.allBrands = Array.from(new Set(this.products.map(p => p.Brand))).sort();
                    const keys = new Set();
                    this.products.forEach(p => Object.keys(p).forEach(k => { if (!['Brand', 'Model', 'Category', 'Star Rating'].includes(k)) keys.add(k); }));
                    keys.forEach(k => {
                        const vals = Array.from(new Set(this.products.map(p => p[k]))).filter(v => v && String(v).length < 40).sort();
                        if (vals.length > 1 && vals.length < 100) { this.dynamicFilters[k] = vals; this.activeFilters[k] = []; }
                    });
                },
                
                viewSpecs(product) { this.selectedProduct = product; this.isSpecsOpen = true; document.body.classList.add('modal-open'); },
                closeSpecs() { this.isSpecsOpen = false; document.body.classList.remove('modal-open'); },
                openFilter() { this.isFilterOpen = true; document.body.classList.add('modal-open'); },
                closeFilter() { this.isFilterOpen = false; document.body.classList.remove('modal-open'); },
                resetFilters() { this.brandFilters = []; this.searchQuery = ''; Object.keys(this.activeFilters).forEach(k => this.activeFilters[k] = []); },
                
                initInfiniteScroll() {
                    new IntersectionObserver((entries) => {
                        if (entries[0].isIntersecting && !this.isLoading && this.displayLimit < this.filteredProducts.length) this.displayLimit += 24;
                    }, { threshold: 0.1 }).observe(document.getElementById('load-more-trigger'));
                },
                
                get currentCategoryName() { return this.categories.find(c => c.file === this.selectedCategory)?.name || 'Database'; },
                get filteredCategories() {
                    const q = this.catSearchQuery.toLowerCase();
                    return this.categories.filter(c => c.name.toLowerCase().includes(q));
                },
                get filteredProducts() {
                    let list = [...this.products];
                    if (this.searchQuery) { const q = this.searchQuery.toLowerCase(); list = list.filter(p => (p.Brand + p.Model).toLowerCase().includes(q)); }
                    if (this.brandFilters.length > 0) list = list.filter(p => this.brandFilters.includes(p.Brand));
                    Object.keys(this.activeFilters).forEach(spec => { if (this.activeFilters[spec].length > 0) list = list.filter(p => this.activeFilters[spec].includes(p[spec])); });
                    return list;
                }
            }
        }
    </script>
</body>
</html>
