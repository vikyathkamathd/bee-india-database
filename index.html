<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>BEE Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        body.modal-open { overflow: hidden; }
        .search-results-dropdown { max-height: 400px; overflow-y: auto; }
    </style>
</head>
<body class="bg-[#f1f3f6] text-gray-800 antialiased font-sans" :class="isModalOpen() ? 'modal-open' : ''" x-data="applianceApp()" x-init="initApp()">

    <!-- Header -->
    <header class="bg-[#2874f0] sticky top-0 z-50 shadow-md">
        <div class="max-w-3xl mx-auto px-4 h-14 flex items-center gap-4">
            <h1 class="text-white font-black italic text-xl tracking-tighter cursor-pointer" @click="location.reload()">BEE</h1>
            
            <div class="relative flex-1 group">
                <div class="relative flex items-center bg-white rounded-sm shadow-inner">
                    <input type="text" 
                           x-model.debounce.300ms="searchQuery" 
                           @focus="isSearchFocused = true"
                           @click.away="isSearchFocused = false"
                           placeholder="Search models, brands, or categories..." 
                           class="w-full py-2 pl-3 pr-10 text-sm outline-none rounded-sm">
                    <span class="absolute right-3 text-gray-400 font-bold">🔍</span>
                </div>

                <div x-show="isSearchFocused && searchQuery.length > 0" 
                     x-cloak
                     class="absolute top-[100%] left-0 right-0 bg-white shadow-2xl rounded-b-sm border-t border-gray-100 z-50 search-results-dropdown">
                    
                    <template x-if="filteredCategories.length > 0">
                        <div>
                            <div class="bg-gray-50 px-4 py-2 text-[10px] font-black text-gray-400 uppercase tracking-widest">Categories</div>
                            <template x-for="cat in filteredCategories" :key="cat.file">
                                <div @mousedown="selectCategory(cat)" class="px-4 py-3 hover:bg-blue-50 cursor-pointer flex items-center justify-between border-b border-gray-50">
                                    <span class="text-sm font-bold text-gray-700" x-text="cat.name"></span>
                                    <span class="text-[10px] text-blue-500 font-black">SWITCH →</span>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </header>

    <!-- Category Banner -->
    <section class="bg-white border-b sticky top-14 z-40">
        <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex flex-col">
                <span class="text-xs font-black text-[#2874f0] uppercase tracking-tight" x-text="currentCategoryName"></span>
                <span class="text-[10px] text-gray-400 font-bold" x-text="'Verified: ' + lastUpdated"></span>
            </div>
            <div class="text-right">
                <span class="text-[10px] font-black text-gray-400 uppercase" x-text="filteredProducts.length + ' Results'"></span>
            </div>
        </div>
    </section>

    <!-- Main Feed -->
    <main class="max-w-3xl mx-auto p-2 pb-20">
        <div class="space-y-2">
            <template x-for="p in filteredProducts.slice(0, displayLimit)" :key="p.Model + Math.random()">
                <div class="bg-white p-4 flex flex-col border-b border-gray-100 transition-all cursor-pointer" @click="viewSpecs(p)">
                    
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex-1">
                            <span class="text-[10px] font-black text-gray-400 uppercase tracking-wider" x-text="p.Brand"></span>
                            <h3 class="text-sm font-bold text-gray-800 leading-snug line-clamp-2 mt-0.5" x-text="p.Model"></h3>
                        </div>
                        <div x-show="p['Star Rating'] && p['Star Rating'] != '0'" class="flex items-center gap-1 bg-green-600 text-white px-2 py-0.5 rounded-sm text-xs font-black ml-4 shadow-sm">
                            <span x-text="p['Star Rating']"></span> <span>★</span>
                        </div>
                    </div>

                    <!-- Mini Spec Grid -->
                    <div class="grid grid-cols-2 gap-x-4 gap-y-2 mt-2 pt-3 border-t border-gray-50">
                        <template x-for="[key, val] in getMiniSpecs(p)">
                            <div class="flex flex-col">
                                <span class="text-[9px] text-gray-400 font-bold uppercase tracking-tighter" x-text="key"></span>
                                <span class="text-[11px] text-gray-700 font-black truncate" x-text="val"></span>
                            </div>
                        </template>
                    </div>
                </div>
            </template>
        </div>

        <div id="load-more-trigger" class="py-10 flex justify-center">
            <template x-if="isLoading">
                <div class="w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            </template>
        </div>
    </main>

    <!-- Fixed Bottom Bar -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex h-14 shadow-[0_-4px_10px_rgba(0,0,0,0.05)] z-[60]">
        <button @click="isSortOpen = true" class="flex-1 font-black text-xs text-gray-600 border-r border-gray-100 flex items-center justify-center gap-2 hover:bg-gray-50">
            <span class="text-base">⇅</span> SORT
        </button>
        <button @click="isFilterOpen = true" class="flex-1 font-black text-xs text-gray-600 flex items-center justify-center gap-2 hover:bg-gray-50">
            <span class="text-base">⚙️</span> FILTER
        </button>
    </div>

    <!-- Sort Bottom Sheet -->
    <div x-show="isSortOpen" class="fixed inset-0 z-[100]" x-cloak>
        <div @click="isSortOpen = false" class="absolute inset-0 bg-black/60 transition-opacity"></div>
        <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-2xl overflow-hidden" x-transition:enter="translate-y-full duration-300">
            <div class="p-4 border-b flex items-center justify-between bg-gray-50">
                <span class="text-xs font-black text-gray-400 uppercase tracking-widest">Sort Results By</span>
                <button @click="isSortOpen = false" class="text-2xl text-gray-300">&times;</button>
            </div>
            <div class="flex flex-col max-h-[60vh] overflow-y-auto">
                <template x-for="option in dynamicSortOptions">
                    <button @click="sortBy = option.value; isSortOpen = false" 
                            class="p-4 text-left text-sm font-bold flex items-center justify-between border-b border-gray-50 hover:bg-blue-50 transition-colors">
                        <span :class="sortBy === option.value ? 'text-blue-600' : 'text-gray-700'" x-text="option.label"></span>
                        <div x-show="sortBy === option.value" class="w-2 h-2 rounded-full bg-blue-600 shadow-[0_0_8px_rgba(37,99,235,0.5)]"></div>
                    </button>
                </template>
            </div>
        </div>
    </div>

    <!-- Filter Sidebar (Full Screen Mobile) -->
    <div x-show="isFilterOpen" class="fixed inset-0 z-[100] bg-white flex flex-col" x-cloak>
        <div class="h-14 flex items-center justify-between px-4 border-b">
            <h2 class="font-black text-sm uppercase tracking-wider">Filters</h2>
            <button @click="isFilterOpen = false" class="text-2xl text-gray-400">&times;</button>
        </div>
        <div class="flex flex-1 overflow-hidden">
            <div class="w-1/3 bg-[#f1f3f6] overflow-y-auto border-r h-full">
                <button @click="activeFilterTab = 'brand'" 
                        :class="activeFilterTab === 'brand' ? 'bg-white text-blue-600 border-l-4 border-blue-600' : 'text-gray-500'" 
                        class="w-full text-left p-4 text-[10px] font-black uppercase">Brand</button>
                <template x-for="(options, spec) in dynamicFilters">
                    <button @click="activeFilterTab = spec" 
                            :class="activeFilterTab === spec ? 'bg-white text-blue-600 border-l-4 border-blue-600' : 'text-gray-500'" 
                            class="w-full text-left p-4 text-[10px] font-black uppercase truncate" x-text="spec"></button>
                </template>
            </div>
            <div class="flex-1 overflow-y-auto bg-white p-2">
                <div x-show="activeFilterTab === 'brand'">
                    <template x-for="b in allBrands">
                        <label class="flex items-center gap-3 p-3 hover:bg-gray-50 rounded-md cursor-pointer border-b border-gray-50 last:border-0">
                            <input type="checkbox" :value="b" x-model="brandFilters" class="w-5 h-5 accent-blue-600 rounded-sm">
                            <span class="text-sm text-gray-700 font-bold" x-text="b"></span>
                        </label>
                    </template>
                </div>
                <template x-for="(options, spec) in dynamicFilters">
                    <div x-show="activeFilterTab === spec">
                        <template x-for="opt in options">
                            <label class="flex items-center gap-3 p-3 hover:bg-gray-50 rounded-md cursor-pointer border-b border-gray-50 last:border-0">
                                <input type="checkbox" :value="opt" x-model="activeFilters[spec]" class="w-5 h-5 accent-blue-600 rounded-sm">
                                <span class="text-sm text-gray-700 font-bold" x-text="opt"></span>
                            </label>
                        </template>
                    </div>
                </template>
            </div>
        </div>
        <div class="p-4 border-t flex gap-3 bg-white shadow-[0_-4px_10px_rgba(0,0,0,0.05)]">
            <button @click="resetFilters()" class="flex-1 py-3 text-[10px] font-black text-gray-500 border border-gray-200 rounded-sm uppercase tracking-widest">Clear All</button>
            <button @click="isFilterOpen = false" class="flex-1 py-3 text-[10px] font-black text-white bg-[#fb641b] rounded-sm uppercase tracking-widest shadow-md">Apply Filters</button>
        </div>
    </div>

    <!-- Details Modal -->
    <div x-show="isSpecsOpen" class="fixed inset-0 z-[100] flex flex-col justify-end" x-cloak>
        <div @click="closeSpecs()" class="absolute inset-0 bg-black/70 transition-opacity"></div>
        <div class="relative bg-white w-full max-w-2xl mx-auto h-[85vh] rounded-t-2xl flex flex-col shadow-2xl overflow-hidden" x-transition:enter="translate-y-full duration-300">
            <div class="p-5 border-b flex justify-between items-start bg-white sticky top-0 z-10">
                <div>
                    <span class="text-[10px] font-black text-blue-600 uppercase tracking-widest" x-text="selectedProduct?.Brand"></span>
                    <h2 class="text-lg font-bold text-gray-900 leading-tight mt-1" x-text="selectedProduct?.Model"></h2>
                </div>
                <button @click="closeSpecs()" class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-400 hover:text-gray-800">&times;</button>
            </div>
            <div class="flex-1 overflow-y-auto p-4 bg-gray-50">
                <div class="bg-white rounded-sm border border-gray-200 overflow-hidden shadow-sm">
                    <template x-for="(val, key) in selectedProduct">
                        <template x-if="val && !['Category', 'Brand', 'Model'].includes(key)">
                            <div class="flex flex-col sm:flex-row py-4 px-5 border-b border-gray-50 last:border-0 hover:bg-gray-50">
                                <span class="text-[10px] text-gray-400 font-black uppercase w-full sm:w-1/2 mb-1 sm:mb-0" x-text="key"></span>
                                <span class="text-sm text-gray-800 font-black w-full sm:w-1/2 sm:text-right" x-text="val"></span>
                            </div>
                        </template>
                    </template>
                </div>
            </div>
        </div>
    </div>

    <script>
        function applianceApp() {
            return {
                selectedCategory: '', categories: [], products: [], searchQuery: '', 
                isSearchFocused: false, displayLimit: 20, isLoading: false,
                isFilterOpen: false, isSortOpen: false, activeFilterTab: 'brand',
                sortBy: 'relevance', brandFilters: [], allBrands: [],
                activeFilters: {}, dynamicFilters: {}, selectedProduct: null, 
                isSpecsOpen: false, lastUpdated: '',

                async initApp() { await this.scanFiles(); this.initInfiniteScroll(); },
                
                async scanFiles() {
                    try {
                        const res = await fetch('data/manifest.json');
                        const data = await res.json();
                        this.lastUpdated = data.last_updated;
                        this.categories = data.files.map(f => ({ file: 'data/' + f, name: f.replace('.json', '').replace(/_/g, ' ') }));
                        if (this.categories.length > 0) this.selectCategory(this.categories[0]);
                    } catch (e) {}
                },

                selectCategory(cat) {
                    this.selectedCategory = cat.file;
                    this.searchQuery = '';
                    this.fetchData();
                },
                
                async fetchData() {
                    if (!this.selectedCategory) return;
                    this.isLoading = true; this.displayLimit = 20;
                    try {
                        const res = await fetch(this.selectedCategory);
                        this.products = await res.json();
                        this.generateFilters();
                    } catch (e) { this.products = []; }
                    this.isLoading = false;
                },
                
                generateFilters() {
                    this.dynamicFilters = {}; this.activeFilters = {};
                    this.allBrands = Array.from(new Set(this.products.map(p => p.Brand))).sort();
                    const keys = new Set();
                    this.products.forEach(p => Object.keys(p).forEach(k => { 
                        if (!['Brand', 'Model', 'Category', 'Star Rating'].includes(k)) keys.add(k); 
                    }));
                    keys.forEach(k => {
                        const vals = Array.from(new Set(this.products.map(p => p[k]))).filter(v => v && String(v).length < 40).sort();
                        if (vals.length > 1 && vals.length < 50) { 
                            this.dynamicFilters[k] = vals; 
                            this.activeFilters[k] = []; 
                        }
                    });
                },

                isModalOpen() { return this.isFilterOpen || this.isSortOpen || this.isSpecsOpen; },
                viewSpecs(product) { this.selectedProduct = product; this.isSpecsOpen = true; },
                closeSpecs() { this.isSpecsOpen = false; this.selectedProduct = null; },
                resetFilters() { this.brandFilters = []; Object.keys(this.activeFilters).forEach(k => this.activeFilters[k] = []); },
                
                getMiniSpecs(p) {
                    return Object.entries(p).filter(([k, v]) => !['Brand', 'Model', 'Category', 'Star Rating'].includes(k) && v).slice(0, 4);
                },

                initInfiniteScroll() {
                    new IntersectionObserver((entries) => {
                        if (entries[0].isIntersecting && !this.isLoading && this.displayLimit < this.filteredProducts.length) {
                            this.displayLimit += 20;
                        }
                    }, { threshold: 0.1 }).observe(document.getElementById('load-more-trigger'));
                },
                
                get currentCategoryName() { return this.categories.find(c => c.file === this.selectedCategory)?.name || 'Select Category'; },
                get filteredCategories() {
                    const q = this.searchQuery.toLowerCase();
                    return this.categories.filter(c => c.name.toLowerCase().includes(q));
                },

                get dynamicSortOptions() {
                    const base = [
                        { label: 'Relevance', value: 'relevance' },
                        { label: 'Highest Star Rating', value: 'stars' },
                        { label: 'Brand (A-Z)', value: 'brand' }
                    ];
                    // Find common numeric keys for sorting (Watts, Capacity, etc.)
                    const numericKeys = new Set();
                    this.products.slice(0, 50).forEach(p => {
                        Object.entries(p).forEach(([k, v]) => {
                            if (!['Brand', 'Model', 'Category', 'Star Rating'].includes(k) && !isNaN(parseFloat(v))) {
                                numericKeys.add(k);
                            }
                        });
                    });
                    numericKeys.forEach(k => {
                        base.push({ label: `${k} (High to Low)`, value: `num_desc_${k}` });
                        base.push({ label: `${k} (Low to High)`, value: `num_asc_${k}` });
                    });
                    return base;
                },

                get filteredProducts() {
                    let list = [...this.products];
                    if (this.searchQuery) {
                        const q = this.searchQuery.toLowerCase();
                        list = list.filter(p => (p.Brand + p.Model).toLowerCase().includes(q));
                    }
                    if (this.brandFilters.length > 0) list = list.filter(p => this.brandFilters.includes(p.Brand));
                    Object.keys(this.activeFilters).forEach(spec => {
                        if (this.activeFilters[spec].length > 0) list = list.filter(p => this.activeFilters[spec].includes(p[spec]));
                    });

                    if (this.sortBy === 'stars') {
                        list.sort((a, b) => (parseInt(b['Star Rating']) || 0) - (parseInt(a['Star Rating']) || 0));
                    } else if (this.sortBy === 'brand') {
                        list.sort((a, b) => a.Brand.localeCompare(b.Brand));
                    } else if (this.sortBy.startsWith('num_')) {
                        const [_, dir, key] = this.sortBy.split('_');
                        list.sort((a, b) => {
                            const valA = parseFloat(a[key]) || 0;
                            const valB = parseFloat(b[key]) || 0;
                            return dir === 'desc' ? valB - valA : valA - valB;
                        });
                    }
                    return list;
                }
            }
        }
    </script>
</body>
</html>
