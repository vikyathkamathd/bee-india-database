name: Daily BEE Database Sync

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Extraction
        run: python scraper.py

      - name: Generate Frontend Manifest
        run: |
          mkdir -p data
          python -c "import os, json; files = [f for f in os.listdir('data') if f.endswith('.json')]; json.dump(files, open('data/manifest.json', 'w'))"

      - name: Push Updates
        run: |
          git config --global user.name 'BEE-Bot'
          git config --global user.email 'bot@github.com'
          git add data/
          git commit -m "Auto-update BEE dataset" || echo "No changes to commit"
          git push
